<!DOCTYPE html>
<html>
<head>
  <title>Logic Cube Floating — Megsy Templates</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #111; }
    canvas { display: block; outline: none !important; }

    /* ── FPS Counter ── */
    #fpsCounter {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(28,28,30,0.75);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px 14px;
      z-index: 150;
      pointer-events: none;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .fps-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.35);
    }
    #fpsValue {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 100;
      pointer-events: none;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .hud-stats {
      display: flex;
      gap: 24px;
      background: rgba(28,28,30,0.75);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 28px;
    }

    .hud-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.35);
    }

    .hud-stat-value {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: center;
    }

    .hud-actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .hud-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .hud-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .hud-btn:active {
      transform: scale(0.96);
    }
    .hud-btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
    }
    .hud-btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
    }

    .hud-keys {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .key-hint {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.25);
      letter-spacing: 3px;
    }

    .key-hint-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.15);
    }

    /* ── Solved Message ── */
    #solvedMsg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(28,28,30,0.85);
      backdrop-filter: blur(60px) saturate(200%);
      -webkit-backdrop-filter: blur(60px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 30px 50px;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      font-family: 'Inter', sans-serif;
    }
    #solvedMsg.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .solved-icon {
      font-size: 40px;
    }

    .solved-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .solved-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* ── Settings Panel ── */
    #settingsToggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(28,28,30,0.75);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      font-family: 'Inter', sans-serif;
    }
    #settingsToggle:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    #settingsPanel {
      position: fixed;
      top: 60px;
      right: 16px;
      width: 260px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: rgba(28,28,30,0.82);
      backdrop-filter: blur(50px) saturate(180%);
      -webkit-backdrop-filter: blur(50px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      z-index: 200;
      font-family: 'Inter', -apple-system, sans-serif;
      display: none;
      pointer-events: auto;
    }
    #settingsPanel.open {
      display: block;
    }
    #settingsPanel::-webkit-scrollbar {
      width: 4px;
    }
    #settingsPanel::-webkit-scrollbar-track {
      background: transparent;
    }
    #settingsPanel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }

    .settings-section {
      margin-bottom: 14px;
    }
    .settings-section:last-child {
      margin-bottom: 0;
    }

    .settings-section-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      flex-shrink: 0;
      margin-right: 10px;
    }

    .setting-row input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
    }
    .setting-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      cursor: pointer;
      border: none;
    }
    .setting-row input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      cursor: pointer;
      border: none;
    }

    .setting-value {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      min-width: 30px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .setting-toggle {
      position: relative;
      width: 34px;
      height: 18px;
      background: rgba(255,255,255,0.1);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s ease;
      border: none;
      padding: 0;
      flex-shrink: 0;
    }
    .setting-toggle.on {
      background: rgba(52,199,89,0.7);
    }
    .setting-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }
    .setting-toggle.on::after {
      transform: translateX(16px);
    }

    .setting-row select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }
    .setting-row select option {
      background: #222;
      color: #ccc;
    }

    /* ── Help Toggle ── */
    #helpToggle {
      position: fixed;
      top: 16px;
      right: 58px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(28,28,30,0.75);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s ease;
    }
    #helpToggle:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    #helpTooltip {
      position: absolute;
      top: 42px;
      right: 0;
      background: rgba(28,28,30,0.88);
      backdrop-filter: blur(50px) saturate(180%);
      -webkit-backdrop-filter: blur(50px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    #helpToggle:hover #helpTooltip {
      opacity: 1;
    }
    .help-row {
      margin-bottom: 6px;
    }
    .help-row:last-child {
      margin-bottom: 0;
    }
    .help-keys {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
    }
    .help-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
    .help-desc b {
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module" src="/scene.js"></script>
  <div style="position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:99999;font-family:Inter,system-ui,sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:8px 14px;border-radius:999px;background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);pointer-events:none">Megsy Templates</div></body>
</html>
